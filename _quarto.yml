website:
  title: "The SABRhood"
  site-url: "https://thesabrhood.com"
  favicon: "images/sabrlogo.png"
  open-graph:
    image: "images/sabrhood-social-preview-v1.png"
  twitter-card:
    image: "images/sabrhood-social-preview-v1.png"
    card-style: summary_large_image
  google-analytics: "G-GGNXXW6FWM"
  navbar:
    pinned: true
    collapse-below: lg
    background: "#FFFFFF"
    foreground: "#BD3039"
    logo: "images/thesabrhood2clean.png"
    left:
      - href: index.qmd
        text: Home
      - href: today.qmd
        text: Today
      - href: races.qmd
        text: Races
      - text: Intelligence
        menu:
          - href: story-desk.qmd
            text: Story Engine
          - href: players.qmd
            text: Players
          - href: player-change-engine.qmd
            text: Player Change Engine
          - href: teams.qmd
            text: Teams
          - href: team-dossiers.qmd
            text: Team Dossiers
          - href: matchups.qmd
            text: Matchups
          - href: pitch-lab.qmd
            text: Pitch Lab
          - href: aaa.qmd
            text: Triple-A Watch
          - href: history.qmd
            text: History
      - href: projections.qmd
        text: Projections
      - href: newsletter.qmd
        text: Newsletter
      - href: graphics-feed.qmd
        text: Graphics
      - href: blog.qmd
        text: Research
      - href: broadcast.qmd
        text: Broadcast
    right:
      - href: about.qmd
        text: About
  page-footer:
    left: "© 2026 The SABRhood"
    center:
      - href: methodology.qmd
        text: Methodology
      - href: glossary.qmd
        text: Glossary
      - href: history.qmd
        text: History Desk
    right:
      - href: "https://x.com/thesabrhood"
        text: "@thesabrhood"
  search:
    location: navbar
    type: overlay
  announcement:
    icon: info-circle
    dismissable: true
    content: "Rebuild preview: analytical snapshot through June 14, 2026. Public probabilities remain in validation."
    type: primary
    position: below-navbar

format:
  html:
    theme: cosmo
    css: styles.css
    page-layout: full
    smooth-scroll: true
    anchor-sections: true
    link-external-newwindow: true
    include-in-header:
      text: |
        <meta name="theme-color" content="#0C2340">
